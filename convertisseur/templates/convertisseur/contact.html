{% extends "convertisseur/base.html" %}
{% block title %}Contact{% endblock %}
{% block content %}
<div class="card">
    <h2 class="card-title">📧 Contactez-nous</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nom</label>
            <input type="text" name="nom" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" rows="5" required style="width:100%; padding:10px;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">📨 Envoyer</button>
    </form>
    {% if message_envoye %}
    <div class="success">✅ Message envoyé !</div>
    {% endif %}
</div>
{% endblock %}
